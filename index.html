<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGC Pulse Engine — Core System</title>

<style>
body {
    background: #0a0a0a;
    color: #00ff95;
    font-family: monospace;
    text-align: center;
    padding: 20px;
}

h1 {
    letter-spacing: 4px;
}

.value {
    font-size: 48px;
    margin: 20px 0;
}

canvas {
    background: black;
    border: 1px solid #00ff95;
    display: block;
    margin: 20px auto;
}
</style>
</head>

<body>

<h1 id="title">⚡ PULSE ENGINE ⚡</h1>

<div class="value" id="pulseValue">0</div>

<canvas id="wave" width="600" height="150"></canvas>

<script>

// ==============================
// 1. PULSE ENGINE (CORE)
// ==============================
const Pulse = {
    base: 0,
    slow: 0,
    fast: 0,
    spike: 0,
    bpm: 30
};

// ==============================
// 2. SYSTEM STATE
// ==============================
const System = {
    mode: "idle"
};

function updateSystemState() {
    if (Pulse.bpm < 15) System.mode = "idle";
    else if (Pulse.bpm < 30) System.mode = "build";
    else if (Pulse.bpm < 60) System.mode = "action";
    else System.mode = "chaos";
}

// ==============================
// 3. EVENT SYSTEM
// ==============================
const Events = {
    lastSpike: 0,
    threshold: 0.8
};

function detectEvents() {
    if (Pulse.spike > Events.threshold && Events.lastSpike === 0) {
        triggerSpikeEvent();
        Events.lastSpike = 1;
    }

    if (Pulse.spike < 0.2) {
        Events.lastSpike = 0;
    }
}

function triggerSpikeEvent() {
    console.log("💥 SPIKE", System.mode);

    playKick();

    // flash effect
    document.body.style.background = "#001a10";
    setTimeout(() => {
        document.body.style.background = "#0a0a0a";
    }, 100);
}

// ==============================
// 4. SCENE SYSTEM
// ==============================
const Scene = {
    current: "intro",
    timer: 0
};

function updateScene(dt) {
    Scene.timer += dt;

    if (Scene.timer > 8) {
        nextScene();
        Scene.timer = 0;
    }
}

function nextScene() {
    if (Scene.current === "intro") Scene.current = "build";
    else if (Scene.current === "build") Scene.current = "action";
    else if (Scene.current === "action") Scene.current = "chaos";
    else Scene.current = "intro";

    console.log("🎬 Scene:", Scene.current);
}

// ==============================
// 5. AUDIO SYSTEM
// ==============================
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playKick() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = 60;

    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

// ==============================
// 6. VISUAL MODULES
// ==============================
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

let history = [];

function updateUI() {
    document.getElementById("pulseValue").innerText =
        Math.floor((Pulse.base + 1) * 50);
}

function updateGlow() {
    const glow = 10 + Pulse.spike * 60;
    document.body.style.boxShadow = `0 0 ${glow}px #00ff95`;
}

function updateText() {
    const scale = 1 + Pulse.slow * 0.1;
    document.getElementById("title").style.transform =
        `scale(${scale})`;
}

function updateWave() {
    let combined =
        Pulse.base * 0.4 +
        Pulse.slow * 0.2 +
        Pulse.fast * 0.3 +
        Pulse.spike * 0.5;

    history.push(combined);
    if (history.length > 100) history.shift();

    ctx.clearRect(0, 0, 600, 150);

    ctx.beginPath();
    history.forEach((v, i) => {
        let x = i * 6;
        let y = 75 + v * 50;
        ctx.lineTo(x, y);
    });

    ctx.strokeStyle = "#00ff95";
    ctx.stroke();
}

// ==============================
// 7. MODULE SYSTEM
// ==============================
const Modules = [];

function registerModule(fn) {
    Modules.push(fn);
}

registerModule(updateUI);
registerModule(updateGlow);
registerModule(updateText);
registerModule(updateWave);

// ==============================
// 8. PULSE UPDATE
// ==============================
function updatePulse(t) {
    let time = t / 1000;
    let f = Pulse.bpm / 60;

    Pulse.base = Math.sin(time * f * Math.PI * 2);
    Pulse.slow = Math.sin(time * f * 0.5 * Math.PI * 2);
    Pulse.fast = Math.sin(time * f * 3 * Math.PI * 2);

    Pulse.spike = Math.max(
        0,
        Math.abs(Math.sin(time * f * Math.PI * 2)) ** 5
    );
}

// ==============================
// 9. MAIN LOOP
// ==============================
let last = Date.now();

function loop() {
    let now = Date.now();
    let dt = (now - last) / 1000;
    last = now;

    updatePulse(now);
    updateSystemState();
    detectEvents();
    updateScene(dt);

    Modules.forEach(fn => fn());

    requestAnimationFrame(loop);
}

// START
loop();

</script>
</body>
</html>
