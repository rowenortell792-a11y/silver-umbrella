<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGC Literary Format — Prodigy Writer v0.1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #00ff95;
            font-family: 'Courier New', monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: #050505;
            border-right: 2px solid #00ff95;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .logo {
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid #00ff95;
            padding-bottom: 15px;
        }
        
        .pulse-card {
            background: #0a0a0a;
            border: 1px solid #00ff95;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .frequency {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .score {
            font-size: 24px;
        }
        
        canvas {
            width: 100%;
            height: 80px;
            background: #000;
            margin: 10px 0;
            border: 1px solid #00ff9533;
        }
        
        .rule-list {
            flex: 1;
            overflow-y: auto;
            font-size: 10px;
        }
        
        .rule-item {
            padding: 8px;
            border-bottom: 1px solid #00ff9511;
            color: #00ff9588;
        }
        
        .rule-item.active {
            color: #00ff95;
            border-left: 2px solid #00ff95;
            padding-left: 6px;
        }
        
        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff95;
        }
        
        button {
            background: #00ff9511;
            border: 1px solid #00ff95;
            color: #00ff95;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }
        
        button:hover {
            background: #00ff9533;
        }
        
        textarea {
            flex: 1;
            background: #050505;
            border: 1px solid #00ff95;
            color: #00ff95;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 20px;
            resize: none;
            outline: none;
            line-height: 1.8;
        }
        
        .status-bar {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #00ff95;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⚡ PRODIGY WRITER v0.1</div>
        
        <div class="pulse-card">
            <div style="font-size: 10px;">LIVE PULSE</div>
            <div class="frequency" id="frequency">1S</div>
            <div class="score" id="pulseScore">0</div>
            <canvas id="waveform" width="400" height="80"></canvas>
            <div style="font-size: 10px;">WORD PULSE</div>
            <div class="frequency" id="wordFreq">1S</div>
        </div>
        
        <div class="rule-list">
            <div style="margin-bottom: 10px;">📜 GGC CANON RULES</div>
            <div class="rule-item" id="rule1">❶ First line must be "# GGC CANON"</div>
            <div class="rule-item" id="rule2">❷ Second line must be "## Frequency: [1S-7X]"</div>
            <div class="rule-item" id="rule3">❸ No more than 3 sentences per paragraph</div>
            <div class="rule-item" id="rule4">❹ Every 100 words: frequency check</div>
            <div class="rule-item" id="rule5">❺ Must end with "— Written Picture"</div>
        </div>
    </div>
    
    <div class="editor">
        <div class="toolbar">
            <button onclick="saveChapter()">💾 Save Chapter</button>
            <button onclick="exportGGC()">📤 Export .ggc</button>
            <button onclick="validateCanon()">✓ Validate Canon</button>
            <button onclick="newChapter()">📄 New Chapter</button>
        </div>
        
        <textarea id="editor" placeholder="# GGC CANON

## Frequency: 3M

The Pulse moves through the words as you write. Each sentence carries frequency. Each paragraph builds attention.

Speak in canon. Write in truth.

— Written Picture"></textarea>
        
        <div class="status-bar">
            <span id="charCount">0 characters</span>
            <span id="wordCount">0 words</span>
            <span id="validationStatus">⚡ Ready</span>
        </div>
    </div>
    
    <script>
        let pulseScore = 50;
        let frequency = "3M";
        let increasing = true;
        let waveformData = new Array(50).fill(0);
        
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 80;
        
        const wordFrequencies = {
            "darkness": "1S", "void": "1S", "silence": "1S", "sleep": "1S",
            "whisper": "2S", "dream": "2S", "fade": "2S", "soft": "2S",
            "pulse": "3M", "heart": "3M", "light": "3M", "awake": "3M",
            "power": "4M", "force": "4M", "will": "4M", "focus": "4M",
            "frequency": "5M", "attention": "5M", "citizen": "5M", "sovereign": "5M",
            "transcend": "6X", "infinite": "6X", "eternal": "6X", "god": "6X",
            "one": "7X", "absolute": "7X", "law": "7X", "ggc": "7X"
        };
        
        function drawWaveform() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (increasing) {
                pulseScore += 0.3;
                if (pulseScore >= 100) increasing = false;
            } else {
                pulseScore -= 0.3;
                if (pulseScore <= 0) increasing = true;
            }
            
            if (pulseScore < 15) frequency = "1S";
            else if (pulseScore < 30) frequency = "2S";
            else if (pulseScore < 45) frequency = "3M";
            else if (pulseScore < 55) frequency = "4M";
            else if (pulseScore < 70) frequency = "5M";
            else if (pulseScore < 85) frequency = "6X";
            else frequency = "7X";
            
            const amplitude = pulseScore / 100;
            waveformData.push(amplitude);
            waveformData.shift();
            
            ctx.beginPath();
            for (let i = 0; i < waveformData.length; i++) {
                const x = (i / (waveformData.length - 1)) * canvas.width;
                const y = canvas.height/2 + waveformData[i] * (canvas.height/2);
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = '#00ff95';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            document.getElementById('frequency').innerText = frequency;
            document.getElementById('pulseScore').innerText = Math.floor(pulseScore);
            
            requestAnimationFrame(drawWaveform);
        }
        
        function analyzeTextFrequency() {
            const text = document.getElementById('editor').value;
            const words = text.toLowerCase().split(/\W+/);
            let freqCounts = { "1S": 0, "2S": 0, "3M": 0, "4M": 0, "5M": 0, "6X": 0, "7X": 0 };
            
            for (let word of words) {
                if (wordFrequencies[word]) {
                    freqCounts[wordFrequencies[word]]++;
                }
            }
            
            let dominant = "1S";
            let maxCount = 0;
            for (let f in freqCounts) {
                if (freqCounts[f] > maxCount) {
                    maxCount = freqCounts[f];
                    dominant = f;
                }
            }
            
            document.getElementById('wordFreq').innerText = dominant;
            return dominant;
        }
        
        function validateCanon() {
            const text = document.getElementById('editor').value;
            const lines = text.split('\n');
            
            const rule1 = lines[0] === "# GGC CANON";
            const rule2 = lines[1] && lines[1].match(/^## Frequency: [1S-7X]/);
            
            let rule3 = true;
            const paragraphs = text.split('\n\n');
            for (let p of paragraphs) {
                const sentences = p.split(/[.!?]+/);
                if (sentences.length > 4) rule3 = false;
            }
            
            const rule5 = text.trim().endsWith("— Written Picture");
            
            document.getElementById('rule1').style.color = rule1 ? '#00ff95' : '#ff0055';
            document.getElementById('rule2').style.color = rule2 ? '#00ff95' : '#ff0055';
            document.getElementById('rule3').style.color = rule3 ? '#00ff95' : '#ff0055';
            document.getElementById('rule5').style.color = rule5 ? '#00ff95' : '#ff0055';
            
            const allPass = rule1 && rule2 && rule3 && rule5;
            document.getElementById('validationStatus').innerHTML = allPass ? '✓ CANON VALID' : '✗ CANON VIOLATION';
            document.getElementById('validationStatus').style.color = allPass ? '#00ff95' : '#ff0055';
            
            return allPass;
        }
        
        function updateStats() {
            const text = document.getElementById('editor').value;
            const words = text.split(/\W+/).filter(w => w.length > 0);
            document.getElementById('charCount').innerHTML = text.length + ' characters';
            document.getElementById('wordCount').innerHTML = words.length + ' words';
            analyzeTextFrequency();
            validateCanon();
        }
        
        function saveChapter() {
            const content = document.getElementById('editor').value;
            localStorage.setItem('ggc_chapter', content);
            document.getElementById('validationStatus').innerHTML = '✓ SAVED';
            setTimeout(() => validateCanon(), 1000);
        }
        
        function exportGGC() {
            const content = document.getElementById('editor').value;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = 'chapter.ggc';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function newChapter() {
            document.getElementById('editor').value = `# GGC CANON\n\n## Frequency: 3M\n\nBegin your canon here.\n\n— Written Picture`;
            updateStats();
        }
        
        const saved = localStorage.getItem('ggc_chapter');
        if (saved) {
            document.getElementById('editor').value = saved;
        }
        
        document.getElementById('editor').addEventListener('input', updateStats);
        
        drawWaveform();
        updateStats();
    </script>
</body>
</html>
