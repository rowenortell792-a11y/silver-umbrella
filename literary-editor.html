<!DOCTYPE html>
<html>
<head>
    <title>Pulse Test</title>
    <style>
        body { background: black; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        canvas { background: #111; border: 1px solid #0f0; margin: 20px auto; display: block; }
        .value { font-size: 48px; }
    </style>
</head>
<body>
    <h1>⚡ PULSE TEST</h1>
    <div class="value" id="pulseValue">50</div>
    <canvas id="waveform" width="600" height="150"></canvas>
    
    <script>
        let pulse = 50;
        let direction = 1;
        let waveData = [];
        for (let i = 0; i < 60; i++) waveData.push(0.5);
        
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        
        setInterval(() => {
            pulse += direction * 2;
            if (pulse >= 100) { pulse = 100; direction = -1; }
            if (pulse <= 0) { pulse = 0; direction = 1; }
            
            document.getElementById('pulseValue').innerText = Math.floor(pulse);
            
            let amp = pulse / 100;
            waveData.push(amp);
            waveData.shift();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            for (let i = 0; i < waveData.length; i++) {
                let x = (i / (waveData.length - 1)) * canvas.width;
                let y = canvas.height/2 + waveData[i] * (canvas.height/2);
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;
            ctx.stroke();
        }, 50);
    </script>
</body>
</html>
